name: CodeQL

# Static analysis for security issues on every push/PR and weekly
# (issue #67). Alerts appear under the repository's Security tab.
# Actions are SHA-pinned (#44/#68); Dependabot refreshes the pins.
on:
  push:
    branches: ["master"]
  pull_request:
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # the Java analysis needs a real build; the Actions analysis
          # scans the workflow files themselves (issue #67)
          - language: java
            build-mode: manual
          - language: actions
            build-mode: none
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 25
        if: matrix.language == 'java'
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality

      - name: Build
        if: matrix.language == 'java'
        run: mvn -B -DskipTests package

      - name: Analyze
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
