name: Release

# Pushing a tag like v5.0.0 builds the self-contained jar, checks the tag
# against the pom version, and publishes a GitHub Release with sha256
# checksums, the CycloneDX SBOM, a Reproducible Builds .buildinfo record
# (#185; see docs/reproducibility.md), and build-provenance attestation
# (#8, hardened by #44; SBOM asset per #65).  A second job builds jpackage
# installers (deb/rpm, msi, dmg) with a bundled jlink runtime and a .jls
# file association, and attaches them to the same release (#82).  The
# Windows msi files are Authenticode-signed via SignPath before checksums
# and attestation, once the maintainer has enrolled (#134).
#
# Manual runs (workflow_dispatch) are a dry-run (#44): they build, verify,
# and produce checksums exactly like a tag push, but skip the tag↔pom guard,
# the provenance attestation, and the GitHub Release itself — nothing is
# published.
#
# All actions are pinned to full commit SHAs (supply-chain posture, #44/#68);
# Dependabot keeps the pins fresh via the version comments.
on:
  push:
    tags: ["v*"]
  # Dry run: exercises every build step (jar, checksums, installers) on any
  # ref without touching a release -- the guard, attestation, and publish
  # steps are gated on the push event below.
  workflow_dispatch:
    inputs:
      # Dry-runs normally skip Authenticode signing (#134) so they stay
      # free; a broken SignPath secret would otherwise surface only at
      # release time.  Force-sign once after enrolling (or rotating the
      # token) to prove the credentials against a throwaway artifact.
      force-sign:
        description: "Sign the Windows installers on this dry-run (exercises the SignPath secrets)"
        type: boolean
        default: false

# Least privilege (#68): the workflow token is read-only by default and
# each publishing job elevates only what it uses.
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      # create the release and upload assets
      contents: write
      # sign the provenance attestation (OIDC)
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      # A tag must name exactly the version the pom builds, and SNAPSHOTs
      # never ship: releasing means bumping the pom (e.g. 5.0.0-rc.1, then
      # 5.0.0) and tagging v<that version> (#44). Dry-runs have no tag to
      # check against, so the guard only runs on tag pushes.
      - name: Verify tag matches pom version
        if: github.event_name == 'push'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          POM_VERSION="$(mvn -B -q help:evaluate -Dexpression=project.version -DforceStdout)"
          echo "tag: ${TAG_VERSION}  pom: ${POM_VERSION}"
          if [ "${TAG_VERSION}" != "${POM_VERSION}" ]; then
            echo "::error::tag v${TAG_VERSION} does not match pom version ${POM_VERSION}; bump the pom before tagging"
            exit 1
          fi
          case "${POM_VERSION}" in
            *-SNAPSHOT)
              echo "::error::refusing to release a SNAPSHOT version"
              exit 1
              ;;
          esac

      # The trailing artifact:buildinfo goal runs in the same Maven
      # session, so the resulting target/jls-<version>.buildinfo records
      # the checksums of the artifacts this very build attached (jar,
      # BOM) plus the exact build environment (JDK vendor+version, Maven
      # version) a third party needs to reproduce them bit-for-bit
      # (#185; see docs/reproducibility.md).  The plugin is invoked by
      # full coordinates so the pinned version is explicit.
      - name: Build and test
        run: mvn -B verify org.apache.maven.plugins:maven-artifact-plugin:3.6.0:buildinfo

      - name: Generate sha256 checksums
        run: |
          cd target
          sha256sum jls-*.jar bom.json jls-*.buildinfo > SHA256SUMS
          cat SHA256SUMS

      # Signed, verifiable statement that this exact jar was built by this
      # workflow from this commit: verify with `gh attestation verify` (#44).
      # Skipped on dry-runs — attestations are publications too.
      - name: Attest build provenance
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: target/jls-*.jar

      - name: Publish GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: |
            target/jls-*.jar
            target/bom.json
            target/*.buildinfo
            target/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true

  # Publishes the jar to the GitHub Packages Maven registry, so the
  # repository's Packages sidebar carries the artifact alongside the
  # Release.  GitHub's Maven registry needs an access token even to
  # download public packages, so this complements — never replaces — the
  # Release assets (see the distributionManagement note in the pom).
  maven-registry:
    # a publication, so tag pushes only; dry runs skip it entirely
    if: github.event_name == 'push'
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # server-id matches the pom's distributionManagement id; setup-java
      # writes the matching settings.xml server entry, credentialed from
      # the GITHUB_ACTOR/GITHUB_TOKEN environment
      - name: Set up JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 25
          cache: maven
          server-id: github

      # tests, coverage, and spotbugs already gated the release job's
      # `mvn verify` on this same ref; deploy only needs the artifact
      - name: Publish to GitHub Packages
        run: mvn -B deploy -DskipTests -Djacoco.skip=true -Dspotbugs.skip=true
        env:
          GITHUB_TOKEN: ${{ github.token }}

  # Batch-mode (headless) container image for autograders and CI:
  # `docker run --rm -v "$PWD:/work" ghcr.io/anadon/jls -b -t tests c.jls`.
  # The recipe lives in scripts/build-container.sh + the Dockerfile under
  # resources/packaging/ so local builds and CI cannot drift.  Multi-arch
  # (amd64 native, arm64 + riscv64 via QEMU) — for RISC-V this image and
  # the jar are the only channels, since no riscv64 runners exist and
  # jpackage cannot cross-compile installers.  Dry runs build and
  # smoke-test every platform but never push.
  container-image:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # keyless cosign signing + OCI provenance attestation (#133)
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      # the full test suite already gated the release job's `mvn verify`
      # on this same ref; this leg only needs the jar
      - name: Build jar (tests ran in the release job)
        run: mvn -B -q package -DskipTests

      # native single-arch build first: it is the smoke-testable one
      # (a multi-arch buildx result cannot be --load-ed for docker run)
      - name: Build container image (native, for the smoke test)
        env:
          JLS_SKIP_BUILD: "1"
        run: bash scripts/build-container.sh

      - name: Smoke-test the image
        run: |
          VERSION="$(mvn -B -q help:evaluate -Dexpression=project.version -DforceStdout)"
          docker run --rm "ghcr.io/anadon/jls:${VERSION}" -h

      # arm64 and riscv64 run under QEMU user-mode emulation
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - name: Set up buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to ghcr.io
        if: github.event_name == 'push'
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      # dry runs prove all three platforms build; tag pushes publish the
      # multi-arch manifest (PUSH=1)
      - name: Build multi-arch image (and push on tag)
        env:
          JLS_SKIP_BUILD: "1"
          PLATFORMS: linux/amd64,linux/arm64,linux/riscv64
          PUSH: ${{ github.event_name == 'push' && '1' || '0' }}
        run: bash scripts/build-container.sh

      # Signature and provenance go on the manifest-list DIGEST, not a
      # tag — tags are mutable (#133).  Publications, so tag pushes only.
      - name: Read pushed digest
        if: github.event_name == 'push'
        id: digest
        run: echo "digest=$(cat target/container/digest)" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        if: github.event_name == 'push'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Keyless: the signature binds to this workflow's OIDC identity;
      # verify with
      #   cosign verify ghcr.io/anadon/jls:<version> \
      #     --certificate-identity-regexp='^https://github.com/anadon/JLS/' \
      #     --certificate-oidc-issuer=https://token.actions.githubusercontent.com
      - name: Sign the image (keyless cosign)
        if: github.event_name == 'push'
        run: cosign sign --yes "ghcr.io/anadon/jls@${{ steps.digest.outputs.digest }}"

      # Same provenance statement the jar and installers get (#44),
      # attached to the image in the registry:
      #   gh attestation verify oci://ghcr.io/anadon/jls:<version> --repo anadon/JLS
      - name: Attest build provenance
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/anadon/jls
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true

  # Self-contained installers with a bundled jlink-trimmed runtime and the
  # .jls file association (#82).  The whole recipe lives in
  # scripts/build-installer.sh (jar -> jdeps -> jlink -> jpackage) so local
  # builds and CI cannot drift.
  #
  # Verification status:
  #   - ubuntu-latest (x86_64 deb + rpm + AppImage): recipe verified
  #     end-to-end on Linux (deb installed, launcher ran, .jls
  #     association files present).  Per the #82 adjudication
  #     (2026-07-17) the Linux legs bundle JetBrains Runtime (Wayland
  #     WLToolkit) once the JBR sha256 pin in scripts/build-installer.sh
  #     is armed (issue #101's placeholder convention); until then they
  #     fall back to the build JDK's jlink image with a loud warning in
  #     the build log.
  #   - windows-latest (msi) and macos-latest (dmg, Apple silicon — the
  #     macos-latest runners are arm64): built successfully in dry-runs;
  #     still continue-on-error until a real msi/dmg has been installed
  #     and checked on hardware — flip experimental to false then.  The
  #     icons are real per-platform files (jls.ico / jls.icns are
  #     PNG-bearing containers from scripts/GenerateIcons.java).
  #   - ubuntu-24.04-arm (aarch64 deb + rpm + AppImage) and
  #     windows-11-arm (aarch64 msi): same recipe on ARM runners;
  #     experimental until installed and checked on hardware.
  #   - riscv64: no GitHub runners exist and jpackage cannot
  #     cross-compile its launcher, so RISC-V is served by the container
  #     image (built via QEMU below) and the architecture-independent jar.
  installers:
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest # x86_64
            jdk: temurin
            experimental: false
          - os: ubuntu-24.04-arm # aarch64; uninstalled on real hardware
            jdk: temurin
            experimental: true
          - os: windows-latest # x86_64; uninstalled on real hardware (#82)
            jdk: temurin
            experimental: true
          # zulu: Temurin publishes no Windows-aarch64 JDK 25; Azul does
          - os: windows-11-arm # aarch64; uninstalled on real hardware
            jdk: zulu
            experimental: true
          - os: macos-latest # aarch64; uninstalled on real hardware (#82)
            jdk: temurin
            experimental: true
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    permissions:
      # append installer assets to the release
      contents: write
      # sign the per-installer provenance attestations (OIDC)
      id-token: write
      attestations: write
      # the SignPath action's default github-token reads the job details
      # and downloads the unsigned-msi artifact (#134); job-scoped
      # permissions (#68) default everything unlisted to none
      actions: read
    env:
      # Authenticode signing via SignPath.io's open-source program (#134).
      # Both values come from the SignPath account; neither is private key
      # material — SignPath holds the key.  Until the maintainer enrolls
      # and sets the secrets, SIGNPATH_ENROLLED is 'false' and every
      # signing/verification step below skips cleanly (unsigned msi, as
      # today).  Signing runs on tag pushes, or on a dry-run when the
      # force-sign input is set (to prove the secrets before a release).
      SIGNPATH_ENROLLED: ${{ secrets.SIGNPATH_API_TOKEN != '' && secrets.SIGNPATH_ORGANIZATION_ID != '' }}
      SIGNING_RUN: ${{ github.event_name == 'push' || inputs.force-sign == true }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: ${{ matrix.jdk }}
          java-version: 25
          cache: maven

      # Same guard as the release job: every leg refuses to package a
      # version the tag does not name (#44).
      - name: Verify tag matches pom version
        if: github.event_name == 'push'
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          POM_VERSION="$(mvn -B -q help:evaluate -Dexpression=project.version -DforceStdout)"
          echo "tag: ${TAG_VERSION}  pom: ${POM_VERSION}"
          if [ "${TAG_VERSION}" != "${POM_VERSION}" ]; then
            echo "::error::tag v${TAG_VERSION} does not match pom version ${POM_VERSION}; bump the pom before tagging"
            exit 1
          fi
          case "${POM_VERSION}" in
            *-SNAPSHOT)
              echo "::error::refusing to release a SNAPSHOT version"
              exit 1
              ;;
          esac

      # the windows-11-arm image ships without WiX (windows-latest
      # preinstalls it), and jpackage needs candle/light for --type msi;
      # the x86 WiX binaries run fine under Windows-on-ARM emulation.
      # choco's PATH edit does not reach later steps, hence GITHUB_PATH.
      - name: Install WiX Toolset (Windows on ARM)
        if: matrix.os == 'windows-11-arm'
        shell: pwsh
        run: |
          choco install wixtoolset -y --no-progress
          $wix = (Resolve-Path 'C:\Program Files (x86)\WiX Toolset*\bin')[0].Path
          Add-Content $env:GITHUB_PATH $wix

      # The full test suite already ran under `mvn verify` in the release
      # job; this leg only needs the jar.  Three tests fail on the Windows
      # runner for environmental reasons (CRLF-sensitive round-trip
      # comparison, @TempDir cleanup vs. an open-file handle, font-metric
      # drift in the geometry baseline) — packaging must not depend on them.
      - name: Build jar (tests ran in the release job)
        shell: bash
        run: mvn -B -q package -DskipTests

      # GPG release signing (#136): the rpm gets an embedded rpmsign
      # signature and the AppImage an embedded appimagetool --sign
      # signature, so `rpm -K` and AppImage validators verify natively —
      # the Sigstore attestation below proves origin but is invisible to
      # that tooling.  Custody: the primary key stays offline with the
      # maintainer; CI holds only a passphrase-protected signing subkey
      # (secrets RELEASE_GPG_KEY = armored `gpg --export-secret-subkeys`
      # output, RELEASE_GPG_PASSPHRASE).  Guarded on secret presence
      # rather than event type: releases keep working unsigned until the
      # key exists, and dry-runs exercise the signing path too (signing
      # publishes nothing; the artifacts stay on the runner).
      - name: Import release signing key
        if: runner.os == 'Linux'
        shell: bash
        env:
          RELEASE_GPG_KEY: ${{ secrets.RELEASE_GPG_KEY }}
          RELEASE_GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
        run: |
          if [ -z "${RELEASE_GPG_KEY}" ]; then
            echo "::notice::RELEASE_GPG_KEY secret not set; rpm and AppImage ship unsigned (#136)"
            exit 0
          fi
          GNUPGHOME="$(mktemp -d)"
          export GNUPGHOME
          echo allow-preset-passphrase > "${GNUPGHOME}/gpg-agent.conf"
          gpg --batch --import <<<"${RELEASE_GPG_KEY}"
          FPR="$(gpg --batch --with-colons --list-secret-keys | awk -F: '/^fpr/{print $10; exit}')"
          # the CI secret and the published public key must be the same
          # key, or every signature made here would fail for users; on
          # mismatch stop and audit the secret — do not release (#136)
          if [ -f resources/packaging/RELEASE-KEY.asc ]; then
            PUB="$(gpg --batch --with-colons --show-keys resources/packaging/RELEASE-KEY.asc | awk -F: '/^fpr/{print $10; exit}')"
            if [ "${FPR}" != "${PUB}" ]; then
              echo "::error::RELEASE_GPG_KEY (${FPR}) does not match resources/packaging/RELEASE-KEY.asc (${PUB}); audit the secret (#136)"
              exit 1
            fi
          fi
          # preset the passphrase in the ephemeral agent so rpmsign's
          # and appimagetool's gpg invocations run unattended
          gpgconf --launch gpg-agent
          gpg --batch --with-colons --with-keygrip --list-secret-keys \
            | awk -F: '$1 == "grp" {print $10}' \
            | while read -r grip; do
                "$(gpgconf --list-dirs libexecdir)/gpg-preset-passphrase" \
                  --preset "${grip}" <<<"${RELEASE_GPG_PASSPHRASE}" || true
              done
          echo "GNUPGHOME=${GNUPGHOME}" >> "${GITHUB_ENV}"
          echo "JLS_SIGN_KEY=${FPR}" >> "${GITHUB_ENV}"

      # jar -> jdeps -> jlink -> jpackage; produces target/installer/dist/
      # (deb and, where rpmbuild exists, rpm on Linux; msi on Windows --
      # WiX is preinstalled on windows-latest; dmg on macOS)
      - name: Build installer
        shell: bash
        env:
          JLS_SKIP_BUILD: "1"
        run: bash scripts/build-installer.sh

      # Predictions P1 and P3 from #136, enforced on every signed build:
      # the rpm must verify against the public half of the signing key
      # (`digests signatures OK`), the AppImage's .sha256_sig section
      # must be filled in, and the signed AppImage must still launch
      # (per #136's falsification criteria a signing failure stops the
      # release; a broken launcher means appimagetool's signing damaged
      # the runtime — ship unsigned and report the tool bug upstream).
      - name: Verify release signatures
        if: runner.os == 'Linux' && env.JLS_SIGN_KEY != ''
        shell: bash
        run: |
          DB="$(mktemp -d)"
          rpm --dbpath "${DB}" --initdb
          gpg --batch --export --armor "${JLS_SIGN_KEY}" > "${DB}/pub.asc"
          rpm --dbpath "${DB}" --import "${DB}/pub.asc"
          for f in target/installer/dist/jls-*.rpm; do
            out="$(rpm --dbpath "${DB}" -K "${f}")"
            echo "${out}"
            case "${out}" in
              *"digests signatures OK") ;;
              *) echo "::error::rpm signature verification failed for ${f} (#136)"; exit 1 ;;
            esac
          done
          for f in target/installer/dist/JLS-*.AppImage; do
            # the embedded signature lives in the runtime's .sha256_sig
            # ELF section; still all-zero means nothing was signed
            if readelf -x .sha256_sig "${f}" | awk '/^ *0x/ { for (i = 2; i <= 5 && i <= NF; i++) if ($i !~ /^0+$/) ok = 1 } END { exit !ok }'; then
              echo "${f}: embedded GPG signature present"
            else
              echo "::error::${f} has no embedded signature (#136)"
              exit 1
            fi
            "${f}" --appimage-extract-and-run -h > /dev/null
            echo "${f}: launcher still works (-h)"
          done

      # ---- Authenticode signing of the msi (#134), Windows legs only ----
      # SignPath fetches the artifact from this workflow run, signs it with
      # the service-held key (publisher: "SignPath Foundation" on the OSS
      # tier), and hands the signed file back, overwriting the unsigned msi
      # in target/installer/dist — so the attestation, checksums, and
      # release upload below all operate on the *signed* bytes (H2 in
      # #134: signing mutates the file, so it must precede those steps).
      #
      # Enrollment (one-time, maintainer): apply at signpath.org for the
      # OSS tier, create a project (slug: JLS) whose artifact configuration
      # is rooted at <zip-file> containing the msi — upload-artifact wraps
      # the file in a ZIP by default, and SignPath's GitHub-connector docs
      # require the configuration root to match that — plus a signing
      # policy (slug: release-signing) set to auto-approve requests (a
      # manual-approval policy would time the action out at 600 s on an
      # unattended release), link this repository as the trusted build
      # system, then set the SIGNPATH_API_TOKEN and
      # SIGNPATH_ORGANIZATION_ID repository secrets and prove them once
      # via workflow_dispatch with force-sign.
      - name: Upload unsigned msi for signing
        id: unsigned-msi
        if: runner.os == 'Windows' && env.SIGNING_RUN == 'true' && env.SIGNPATH_ENROLLED == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-msi-unsigned-${{ runner.arch }}
          path: target/installer/dist/*.msi
          if-no-files-found: error
          # an intermediate SignPath consumes within minutes; keep it just
          # long enough to debug a failed signing request
          retention-days: 1

      - name: Sign msi via SignPath
        if: runner.os == 'Windows' && env.SIGNING_RUN == 'true' && env.SIGNPATH_ENROLLED == 'true'
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd # v2.2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: JLS
          signing-policy-slug: release-signing
          github-artifact-id: ${{ steps.unsigned-msi.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: target/installer/dist

      # feeds the verify-windows-signatures job below (osslsigncode runs
      # on Linux; there is no need for a Windows host to check the result)
      - name: Upload signed msi for verification
        if: runner.os == 'Windows' && env.SIGNING_RUN == 'true' && env.SIGNPATH_ENROLLED == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-msi-signed-${{ runner.arch }}
          path: target/installer/dist/*.msi
          if-no-files-found: error

      # visible breadcrumb on tag pushes while unenrolled: the release
      # ships unsigned msi files exactly as before #134
      - name: Note unsigned msi (SignPath not enrolled)
        if: runner.os == 'Windows' && env.SIGNING_RUN == 'true' && env.SIGNPATH_ENROLLED != 'true'
        shell: bash
        run: echo "::notice::SIGNPATH_API_TOKEN / SIGNPATH_ORGANIZATION_ID are not set; the msi ships unsigned (#134)"

      # Same provenance statement as the jar, one per installer (#44).
      # Runs before the checksum step so the glob only matches installers.
      - name: Attest build provenance
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: target/installer/dist/*

      # Extends the release's SHA256SUMS with a per-OS-and-arch list
      # covering the installers built on this leg (macOS runners lack
      # sha256sum; the arch suffix keeps the two Linux legs and the two
      # Windows legs from overwriting each other's asset).
      - name: Generate sha256 checksums
        shell: bash
        run: |
          cd target/installer/dist
          # RUNNER_ARCH first: git-bash's uname reports x86_64 under
          # Windows-on-ARM emulation
          ARCH="${RUNNER_ARCH:-$(uname -m)}"
          case "$ARCH" in ARM64|arm64) ARCH=aarch64 ;; X64|amd64) ARCH=x86_64 ;; esac
          SUMS="SHA256SUMS-installers-$(echo "$RUNNER_OS" | tr '[:upper:]' '[:lower:]')-${ARCH}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum * > "$SUMS"
          else
            shasum -a 256 * > "$SUMS"
          fi
          cat "$SUMS"

      # Appends assets to the release the `release` job created (dry runs
      # stop here: the installers were built and checksummed, nothing ships)
      - name: Upload installers to the GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: target/installer/dist/*
          fail_on_unmatched_files: true

  # Checks the Authenticode signature on both msi files from a Linux host
  # (#134) — osslsigncode needs no Windows machine.  Runs whenever signing
  # ran (tag pushes, or force-sign dry-runs); skips while the SignPath
  # secrets are absent so an unenrolled repository stays green.  A missing
  # or broken signature on a tag push fails this job — loudly, after the
  # release published, since signing problems should never unpublish a
  # working release.
  #
  # osslsigncode checks signature structure and digests; Windows policy is
  # arbitrated by `signtool verify /pa JLS-<v>-<arch>.msi` on a real
  # Windows machine (record that output in the first signed release's PR,
  # per #134 §8).
  #
  # The exactly-two msi requirement doubles as a missing-asset alarm: the
  # matrix marks both Windows legs experimental (continue-on-error), so a
  # failed leg used to leave the run green with that installer silently
  # absent from the release.  Once enrolled, the same failure turns this
  # job red — deliberate, so a missing msi is noticed, but it does
  # tighten the old experimental-leg tolerance on signing runs.
  verify-windows-signatures:
    needs: installers
    if: github.event_name == 'push' || inputs.force-sign == true
    runs-on: ubuntu-latest
    env:
      SIGNPATH_ENROLLED: ${{ secrets.SIGNPATH_API_TOKEN != '' && secrets.SIGNPATH_ORGANIZATION_ID != '' }}
    steps:
      - name: Download signed installers
        if: env.SIGNPATH_ENROLLED == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: windows-msi-signed-*
          merge-multiple: true
          path: signed

      # osslsigncode exits 0 only when the signature verifies, digests and
      # certificate chain included (chain against the Linux CA bundle —
      # should the CA SignPath issues under turn out to be missing from
      # it, the force-sign dry-run surfaces that before any release, and
      # the fix is passing -CAfile with the service's published chain).
      # The grep for the ok-line is belt-and-braces on top of the exit
      # status; `shell: bash` gives pipefail so the tee cannot mask a
      # failure.
      - name: Verify Authenticode signatures (osslsigncode)
        if: env.SIGNPATH_ENROLLED == 'true'
        shell: bash
        run: |
          sudo apt-get -yqq update
          sudo apt-get -yqq install osslsigncode
          shopt -s nullglob
          files=(signed/*.msi)
          if [ "${#files[@]}" -ne 2 ]; then
            echo "::error::expected 2 signed msi files (x86_64 + aarch64), found ${#files[@]}"
            exit 1
          fi
          for msi in "${files[@]}"; do
            echo "== ${msi}"
            osslsigncode verify -in "${msi}" | tee verify.out
            grep -q "Signature verification: ok" verify.out
          done
