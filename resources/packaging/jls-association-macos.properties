# jpackage --file-associations descriptor for .jls circuit files (macOS).
# Paths are resolved relative to the jpackage working directory, which
# scripts/build-installer.sh pins to the repository root (issue #82).
extension=jls
mime-type=application/x-jls-circuit
description=JLS logic circuit
# jls-document.icns, not jls.icns: jpackage also copies the app icon into
# Contents/Resources as JLS.icns, which collides with jls.icns on macOS's
# case-insensitive filesystem (FileAlreadyExistsException)
icon=resources/packaging/jls-document.icns
