name: CI

# push is limited to master so a branch with an open PR builds once,
# not twice (issue #47); the nightly cron runs ONLY the gui-wayland lane
# (issue #101 P3: its 20-consecutive-runs stability record accrues on a
# fixed cadence, independent of push traffic - every other job skips on
# schedule events)
on:
  push:
    branches: ["master"]
  pull_request:
  schedule:
    - cron: "17 4 * * *"

# least-privilege token: the build only reads the repo (issue #68)
permissions:
  contents: read

# a new push to the same branch/PR cancels the still-running build of the
# old head; release.yml deliberately has no concurrency group (issue #47).
# The nightly gets its own group so a cron firing never cancels (or is
# cancelled by) an in-flight master build
concurrency:
  group: ci-${{ github.event_name == 'schedule' && 'nightly' || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (JDK ${{ matrix.java }})
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 25 (current LTS) is the required baseline (#92); the newest GA
        # feature release runs as an advisory forward-compatibility leg —
        # it may fail without blocking the build, and becomes the required
        # leg when it becomes the next LTS
        java: [25, 26]
    # only the LTS leg is required; the feature-release leg is advisory
    continue-on-error: ${{ matrix.java != 25 }}
    steps:
      # actions are pinned to full commit SHAs (supply-chain posture,
      # #44/#68); Dependabot keeps the pins fresh via the version comments
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      # External HDL simulators activate the otherwise-skipped
      # Verilog/VHDL validation tests (issue #60); xvfb activates the
      # display-tagged UI suite (issue #162). Best-effort so a
      # transient apt failure doesn't block the build - each affected
      # suite skips itself when its tool is missing
      - name: Install HDL simulators and virtual display
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends iverilog ghdl xvfb || echo "some optional tools unavailable; their tests will skip"

      # Compiles with -Xlint:deprecation,removal,unchecked -Werror, runs
      # the headless test suite, and runs the SpotBugs check goal
      # (threshold High, baseline in config/spotbugs-exclude.xml).
      # Under xvfb the display-tagged surefire execution also runs
      # (issue #162); the main test execution stays headless either way.
      - name: Build, lint, and analyze
        run: |
          if command -v xvfb-run >/dev/null; then
            xvfb-run -a mvn -B verify -Djls.test.headless=false
          else
            mvn -B verify
          fi

      - name: Upload jar
        if: matrix.java == 25
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jls-jar
          path: target/jls-*.jar

      - name: Upload coverage report
        if: matrix.java == 25
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jacoco-report
          path: target/site/jacoco/

      # per-PR coverage visibility with no external service: the summary
      # table comes straight from the JaCoCo XML report (issue #66)
      - name: Coverage summary
        if: matrix.java == 25
        run: |
          python3 - << 'EOF' >> "$GITHUB_STEP_SUMMARY"
          import xml.etree.ElementTree as ET
          r = ET.parse('target/site/jacoco/jacoco.xml').getroot()
          print('## Coverage (JaCoCo, JDK 25)\n')
          print('| Counter | Covered | Missed | % |')
          print('|---|---|---|---|')
          for c in r.findall('counter'):
              cov, mis = int(c.get('covered')), int(c.get('missed'))
              pct = 100.0 * cov / (cov + mis) if cov + mis else 0.0
              print(f"| {c.get('type')} | {cov} | {mis} | {pct:.1f}% |")
          EOF

  # Windows test lane (issue #111): all three Windows-only failures
  # (CRLF round-trip, held file handles blocking @TempDir cleanup,
  # golden-file CRLF checkout) shipped because no Windows leg ran the
  # suite. Runs headless — the display-tagged suite and the HDL
  # simulator suites skip themselves — and skips the JaCoCo ratchet,
  # whose floors are calibrated against the fuller Linux run.
  # Advisory while it stabilizes (same promotion rule as gui-wayland:
  # required once 20 consecutive runs show at most one failure).
  windows:
    name: Build (Windows, JDK 25)
    if: github.event_name != 'schedule'
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Build, lint, and analyze
        shell: bash
        run: mvn -B verify -Djacoco.skip=true

  # Machine-checked proofs (proofs/README.md): the Agda development in
  # proofs/ verifies the spatial-index query-parity and draw-culling
  # theorems the drag/drop hot path relies on; a non-zero exit means a
  # proof no longer checks. ProofBridgeTest (in the build job) pins the
  # proof's modelling assumptions to the Java implementation.
  proofs:
    name: Verify Agda proofs
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Agda
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends agda agda-stdlib

      # the stdlib is copied somewhere writable because Agda refreshes
      # .agdai interface files beside the sources while checking
      - name: Check proofs
        run: |
          cp -r /usr/share/agda-stdlib "$RUNNER_TEMP/agda-stdlib"
          LC_ALL=C.UTF-8 agda -i "$RUNNER_TEMP/agda-stdlib" -i proofs proofs/SpatialIndexCorrectness.agda

  # First-light Wayland GUI lane (issue #101): boots the JLS GUI on
  # JetBrains Runtime's experimental WLToolkit (Project Wakefield)
  # against a headless sway compositor - no X11 anywhere - and captures
  # a screenshot, the compositor tree, and JLS's stderr as artifacts.
  # The rig first maps a minimal HelloSwingControl frame on the same
  # runtime/compositor, so a failure is automatically classified as
  # JLS-side (exit 1) or upstream JBR/sway (exit 2) per #101 section 9.
  # Runs on every event including the nightly cron (which runs ONLY this
  # job) so the #101 P3 stability record accrues daily.
  # continue-on-error while the lane stabilizes (#101 H2/P3: it becomes
  # a required check once 20 consecutive runs show at most one failure).
  gui-wayland:
    name: GUI first light (Wayland, JBR)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      # ---- JBR pin (issues #101/#105) --------------------------------
      # JetBrains Runtime 25.0.3b508.16 (tag jbr-release-25.0.3b508.16),
      # linux-x64: the JBR release #101 names as shipping Wakefield's
      # WLToolkit. Also reused by the dev container (README).
      JBR_URL: https://cache-redirector.jetbrains.com/intellij-jbr/jbr-25.0.3-linux-x64-b508.16.tar.gz
      # TODO(maintainer): replace with the tarball's real sha256. The
      # value could not be verified from the authoring sandbox (egress
      # to cache-redirector.jetbrains.com is proxy-blocked; #101 section
      # 1 hit the same wall); runners have ordinary egress, so:
      #   curl -fsSL <JBR_URL> | sha256sum
      # Until then this placeholder fails the checksum on purpose and
      # the job skips with a notice rather than running unverified bits.
      # (Re-verified 2026-07-18: cache-redirector.jetbrains.com is still
      # an egress-policy denial from the authoring sandbox, and the hash
      # is not published anywhere else reachable - GitHub release pages
      # only link the CDN-hosted .checksum file.)
      JBR_SHA256: "UNVERIFIED-PLACEHOLDER-fill-in-real-sha256-see-issue-101"
      # ---- P2 pixel gate (#101) --------------------------------------
      # 0 = record the AE metric without gating. TODO(maintainer): after
      # the first green run, set this to ~10% of the observed AE value
      # from the pixel-diff.txt artifact (decision recorded on #101:
      # calibrate from measurement, not the blind 1% guess).
      PIXEL_DIFF_MIN: "0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      # sway (compositor), grim (screenshots), jq (tree assertions),
      # ImageMagick (pixel diff), and at least one font (Swing text
      # rendering needs one; minimal runners may have none)
      - name: Install Wayland rig tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends sway grim jq imagemagick fontconfig fonts-dejavu-core

      - name: Download JetBrains Runtime
        id: jbr
        run: |
          set -euo pipefail
          if [[ "$JBR_SHA256" == UNVERIFIED-* ]]; then
            echo "::notice title=gui-wayland skipped::JBR_SHA256 is still the placeholder; pin the real checksum (issue #101) to arm this lane."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! curl -fsSL --retry 3 -o "$RUNNER_TEMP/jbr.tar.gz" "$JBR_URL"; then
            echo "::notice title=gui-wayland skipped::could not download JBR from $JBR_URL"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # a checksum mismatch is NOT a skip: fail closed (supply chain)
          echo "$JBR_SHA256  $RUNNER_TEMP/jbr.tar.gz" | sha256sum -c -
          mkdir -p "$RUNNER_TEMP/jbr"
          tar -xzf "$RUNNER_TEMP/jbr.tar.gz" -C "$RUNNER_TEMP/jbr" --strip-components=1
          "$RUNNER_TEMP/jbr/bin/java" -version
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Build jar
        if: steps.jbr.outputs.skip == 'false'
        run: mvn -B -DskipTests package

      - name: Run the Wayland first-light rig
        if: steps.jbr.outputs.skip == 'false'
        run: JBR_HOME="$RUNNER_TEMP/jbr" ARTIFACTS_DIR="$RUNNER_TEMP/wayland-artifacts" scripts/wayland-rig.sh

      - name: Upload rig artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wayland-first-light
          path: ${{ runner.temp }}/wayland-artifacts/
          if-no-files-found: ignore

  # feed GitHub's dependency graph the resolved transitive tree so
  # Dependabot alerts cover what the build actually uses (issue #65)
  dependency-submission:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Submit dependency graph
        uses: advanced-security/maven-dependency-submission-action@b275d12641ac2d2108b2cbb7598b154ad2f2cee8 # v5.0.0

  # Reproducible-builds gate (#44, upgraded by #185): the pom pins
  # project.build.outputTimestamp, so the jar and BOM must be
  # byte-identical across rebuilds.  Two checks, in escalating order:
  #   1. same-runner pre-filter (#44): build twice back-to-back and
  #      compare — catches wall-clock/ordering/randomness regressions
  #      cheaply.
  #   2. independent perturbed rebuild (#185): rebuild the same commit
  #      from a differently-named workspace path with a shifted
  #      timezone, a different locale, and a restrictive umask — the
  #      environment axes the Reproducible Builds definition's "any
  #      party ... build environment" clause covers.  Only the JDK
  #      build is held fixed (identical bytecode requires the same
  #      javac build; that constraint is recorded in the released
  #      .buildinfo and docs/reproducibility.md, not hidden).
  # A mismatch fails the job and uploads both jars so diffoscope can
  # localize the offending input.
  reproducibility:
    name: Reproducible build check
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Build reference jar and BOM
        run: |
          mvn -B -DskipTests package
          ( cd target && sha256sum jls-*.jar bom.json ) > reference.sha256
          mkdir -p "$RUNNER_TEMP/reference"
          cp target/jls-*.jar target/bom.json "$RUNNER_TEMP/reference/"
          echo "reference build:"; cat reference.sha256

      - name: Same-runner rebuild (pre-filter, #44)
        run: |
          rm -rf target
          mvn -B -DskipTests package
          ( cd target && sha256sum jls-*.jar bom.json ) > second.sha256
          echo "second build:"; cat second.sha256
          diff reference.sha256 second.sha256 \
            || { echo "::error::build is not reproducible: checksums differ between two builds of the same commit on the same runner"; exit 1; }

      - name: Independent perturbed rebuild (#185)
        id: perturbed
        run: |
          # a deliberately different workspace path (build-path
          # independence), plus shifted TZ, C locale instead of the
          # runner's C.UTF-8, and umask 077 instead of the default 022
          PERTURBED="$RUNNER_TEMP/independent-rebuild/JLS-Perturbed-Workspace"
          mkdir -p "$PERTURBED"
          git archive HEAD | tar -x -C "$PERTURBED"
          cd "$PERTURBED"
          umask 077
          TZ=Pacific/Kiritimati LC_ALL=C LANG=C mvn -B -DskipTests package
          ( cd target && sha256sum jls-*.jar bom.json ) > perturbed.sha256
          echo "perturbed rebuild:"; cat perturbed.sha256
          echo "reference:";        cat "$GITHUB_WORKSPACE/reference.sha256"
          diff "$GITHUB_WORKSPACE/reference.sha256" perturbed.sha256 \
            || { cp target/jls-*.jar "$RUNNER_TEMP/reference/perturbed-$(cd target && ls jls-*.jar)"; \
                 echo "::error::build is not environment-independent: perturbed rebuild (path/TZ/locale/umask) differs from the reference — run diffoscope on the uploaded jars"; exit 1; }

      # only populated with a second jar when the perturbed rebuild
      # diverged; diffoscope on the pair names the offending input
      - name: Upload jars for diffoscope
        if: failure() && steps.perturbed.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: reproducibility-diverged-jars
          path: ${{ runner.temp }}/reference/

  # Linux installer reproducibility gate (#189, parent #188): the deb, rpm,
  # and AppImage must each be byte-identical across two builds of one
  # commit.  Mirrors the #44 jar gate above; the jar itself is covered
  # there, so the two installer builds share one jar via JLS_SKIP_BUILD and
  # this job isolates the jlink/jpackage/appimagetool stages.  Installing
  # rpm makes rpmbuild present, so the script's rpm leg (which is skipped
  # when rpmbuild is absent) always runs — and is therefore gated — here.
  installer-reproducibility:
    name: Linux installer reproducibility
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      # fakeroot + dpkg-deb for --type deb, rpm for --type rpm, and
      # diffoscope to attribute any mismatch before failing
      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm diffoscope-minimal

      - name: Build installers twice and compare checksums
        run: |
          mvn -B -q -DskipTests package
          JLS_SKIP_BUILD=1 bash scripts/build-installer.sh
          mkdir first-dist
          cp target/installer/dist/* first-dist/
          ( cd first-dist && sha256sum * ) > first.sha256
          JLS_SKIP_BUILD=1 bash scripts/build-installer.sh
          ( cd target/installer/dist && sha256sum * ) > second.sha256
          echo "first build:";  cat first.sha256
          echo "second build:"; cat second.sha256
          diff first.sha256 second.sha256 || {
            for f in first-dist/*; do
              echo "==> diffoscope $(basename "$f")"
              diffoscope --max-text-report-size 500000 \
                "$f" "target/installer/dist/$(basename "$f")" || true
            done
            echo "::error::Linux installers are not reproducible: checksums differ between two builds of the same commit"
            exit 1
          }
