name: Scorecard

# Weekly OpenSSF Scorecard run (issue #68): scores the repository's
# supply-chain posture and publishes results to the OpenSSF API (owner
# consent recorded in #68) so the README badge stays current. Findings
# also land in the Security tab via SARIF upload.
on:
  schedule:
    - cron: "43 7 * * 1"
  push:
    branches: ["master"]

permissions:
  contents: read

jobs:
  analysis:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      # needed by the scorecard action to publish signed results
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          sarif_file: results.sarif
