name: Scorecard

# Weekly OpenSSF Scorecard run (issue #68): scores the repository's
# supply-chain posture and publishes results to the OpenSSF API (owner
# consent recorded in #68) so the README badge stays current. Findings
# also land in the Security tab via SARIF upload.
on:
  schedule:
    - cron: "43 7 * * 1"
  push:
    branches: ["master"]

permissions:
  contents: read

jobs:
  analysis:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      # needed by the scorecard action to publish signed results
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: results.sarif
