name: Release

# Pushing a tag like v5.0.0 builds the self-contained jar, checks the tag
# against the pom version, and publishes a GitHub Release with sha256
# checksums, the CycloneDX SBOM, and build-provenance attestation
# (#8, hardened by #44; SBOM asset per #65).  A second job builds jpackage
# installers (deb/rpm, msi, dmg) with a bundled jlink runtime and a .jls
# file association, and attaches them to the same release (#82).
#
# Manual runs (workflow_dispatch) are a dry-run (#44): they build, verify,
# and produce checksums exactly like a tag push, but skip the tag↔pom guard,
# the provenance attestation, and the GitHub Release itself — nothing is
# published.
#
# All actions are pinned to full commit SHAs (supply-chain posture, #44/#68);
# Dependabot keeps the pins fresh via the version comments.
on:
  push:
    tags: ["v*"]
  # Dry run: exercises every build step (jar, checksums, installers) on any
  # ref without touching a release -- the guard, attestation, and publish
  # steps are gated on the push event below.
  workflow_dispatch:

# Least privilege (#68): the workflow token is read-only by default and
# each publishing job elevates only what it uses.
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      # create the release and upload assets
      contents: write
      # sign the provenance attestation (OIDC)
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      # A tag must name exactly the version the pom builds, and SNAPSHOTs
      # never ship: releasing means bumping the pom (e.g. 5.0.0-rc.1, then
      # 5.0.0) and tagging v<that version> (#44). Dry-runs have no tag to
      # check against, so the guard only runs on tag pushes.
      - name: Verify tag matches pom version
        if: github.event_name == 'push'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          POM_VERSION="$(mvn -B -q help:evaluate -Dexpression=project.version -DforceStdout)"
          echo "tag: ${TAG_VERSION}  pom: ${POM_VERSION}"
          if [ "${TAG_VERSION}" != "${POM_VERSION}" ]; then
            echo "::error::tag v${TAG_VERSION} does not match pom version ${POM_VERSION}; bump the pom before tagging"
            exit 1
          fi
          case "${POM_VERSION}" in
            *-SNAPSHOT)
              echo "::error::refusing to release a SNAPSHOT version"
              exit 1
              ;;
          esac

      - name: Build and test
        run: mvn -B verify

      - name: Generate sha256 checksums
        run: |
          cd target
          sha256sum jls-*.jar bom.json > SHA256SUMS
          cat SHA256SUMS

      # Signed, verifiable statement that this exact jar was built by this
      # workflow from this commit: verify with `gh attestation verify` (#44).
      # Skipped on dry-runs — attestations are publications too.
      - name: Attest build provenance
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: target/jls-*.jar

      - name: Publish GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: |
            target/jls-*.jar
            target/bom.json
            target/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true

  # Publishes the jar to the GitHub Packages Maven registry, so the
  # repository's Packages sidebar carries the artifact alongside the
  # Release.  GitHub's Maven registry needs an access token even to
  # download public packages, so this complements — never replaces — the
  # Release assets (see the distributionManagement note in the pom).
  maven-registry:
    # a publication, so tag pushes only; dry runs skip it entirely
    if: github.event_name == 'push'
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # server-id matches the pom's distributionManagement id; setup-java
      # writes the matching settings.xml server entry, credentialed from
      # the GITHUB_ACTOR/GITHUB_TOKEN environment
      - name: Set up JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 25
          cache: maven
          server-id: github

      # tests, coverage, and spotbugs already gated the release job's
      # `mvn verify` on this same ref; deploy only needs the artifact
      - name: Publish to GitHub Packages
        run: mvn -B deploy -DskipTests -Djacoco.skip=true -Dspotbugs.skip=true
        env:
          GITHUB_TOKEN: ${{ github.token }}

  # Batch-mode (headless) container image for autograders and CI:
  # `docker run --rm -v "$PWD:/work" ghcr.io/anadon/jls -b -t tests c.jls`.
  # The recipe lives in scripts/build-container.sh + the Dockerfile under
  # resources/packaging/ so local builds and CI cannot drift.  Multi-arch
  # (amd64 native, arm64 + riscv64 via QEMU) — for RISC-V this image and
  # the jar are the only channels, since no riscv64 runners exist and
  # jpackage cannot cross-compile installers.  Dry runs build and
  # smoke-test every platform but never push.
  container-image:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # keyless cosign signing + OCI provenance attestation (#133)
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      # the full test suite already gated the release job's `mvn verify`
      # on this same ref; this leg only needs the jar
      - name: Build jar (tests ran in the release job)
        run: mvn -B -q package -DskipTests

      # native single-arch build first: it is the smoke-testable one
      # (a multi-arch buildx result cannot be --load-ed for docker run)
      - name: Build container image (native, for the smoke test)
        env:
          JLS_SKIP_BUILD: "1"
        run: bash scripts/build-container.sh

      - name: Smoke-test the image
        run: |
          VERSION="$(mvn -B -q help:evaluate -Dexpression=project.version -DforceStdout)"
          docker run --rm "ghcr.io/anadon/jls:${VERSION}" -h

      # arm64 and riscv64 run under QEMU user-mode emulation
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - name: Set up buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to ghcr.io
        if: github.event_name == 'push'
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      # dry runs prove all three platforms build; tag pushes publish the
      # multi-arch manifest (PUSH=1)
      - name: Build multi-arch image (and push on tag)
        env:
          JLS_SKIP_BUILD: "1"
          PLATFORMS: linux/amd64,linux/arm64,linux/riscv64
          PUSH: ${{ github.event_name == 'push' && '1' || '0' }}
        run: bash scripts/build-container.sh

      # Signature and provenance go on the manifest-list DIGEST, not a
      # tag — tags are mutable (#133).  Publications, so tag pushes only.
      - name: Read pushed digest
        if: github.event_name == 'push'
        id: digest
        run: echo "digest=$(cat target/container/digest)" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        if: github.event_name == 'push'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Keyless: the signature binds to this workflow's OIDC identity;
      # verify with
      #   cosign verify ghcr.io/anadon/jls:<version> \
      #     --certificate-identity-regexp='^https://github.com/anadon/JLS/' \
      #     --certificate-oidc-issuer=https://token.actions.githubusercontent.com
      - name: Sign the image (keyless cosign)
        if: github.event_name == 'push'
        run: cosign sign --yes "ghcr.io/anadon/jls@${{ steps.digest.outputs.digest }}"

      # Same provenance statement the jar and installers get (#44),
      # attached to the image in the registry:
      #   gh attestation verify oci://ghcr.io/anadon/jls:<version> --repo anadon/JLS
      - name: Attest build provenance
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/anadon/jls
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true

  # Self-contained installers with a bundled jlink-trimmed runtime and the
  # .jls file association (#82).  The whole recipe lives in
  # scripts/build-installer.sh (jar -> jdeps -> jlink -> jpackage) so local
  # builds and CI cannot drift.
  #
  # Verification status:
  #   - ubuntu-latest (x86_64 deb + rpm + AppImage): recipe verified
  #     end-to-end on Linux (deb installed, launcher ran, .jls
  #     association files present).
  #   - windows-latest (msi) and macos-latest (dmg, Apple silicon — the
  #     macos-latest runners are arm64): built successfully in dry-runs;
  #     still continue-on-error until a real msi/dmg has been installed
  #     and checked on hardware — flip experimental to false then.  The
  #     icons are real per-platform files (jls.ico / jls.icns are
  #     PNG-bearing containers from scripts/GenerateIcons.java).
  #   - ubuntu-24.04-arm (aarch64 deb + rpm + AppImage) and
  #     windows-11-arm (aarch64 msi): same recipe on ARM runners;
  #     experimental until installed and checked on hardware.
  #   - riscv64: no GitHub runners exist and jpackage cannot
  #     cross-compile its launcher, so RISC-V is served by the container
  #     image (built via QEMU below) and the architecture-independent jar.
  installers:
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest # x86_64
            jdk: temurin
            experimental: false
          - os: ubuntu-24.04-arm # aarch64; uninstalled on real hardware
            jdk: temurin
            experimental: true
          - os: windows-latest # x86_64; uninstalled on real hardware (#82)
            jdk: temurin
            experimental: true
          # zulu: Temurin publishes no Windows-aarch64 JDK 25; Azul does
          - os: windows-11-arm # aarch64; uninstalled on real hardware
            jdk: zulu
            experimental: true
          - os: macos-latest # aarch64; uninstalled on real hardware (#82)
            jdk: temurin
            experimental: true
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    permissions:
      # append installer assets to the release
      contents: write
      # sign the per-installer provenance attestations (OIDC)
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: ${{ matrix.jdk }}
          java-version: 25
          cache: maven

      # Same guard as the release job: every leg refuses to package a
      # version the tag does not name (#44).
      - name: Verify tag matches pom version
        if: github.event_name == 'push'
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          POM_VERSION="$(mvn -B -q help:evaluate -Dexpression=project.version -DforceStdout)"
          echo "tag: ${TAG_VERSION}  pom: ${POM_VERSION}"
          if [ "${TAG_VERSION}" != "${POM_VERSION}" ]; then
            echo "::error::tag v${TAG_VERSION} does not match pom version ${POM_VERSION}; bump the pom before tagging"
            exit 1
          fi
          case "${POM_VERSION}" in
            *-SNAPSHOT)
              echo "::error::refusing to release a SNAPSHOT version"
              exit 1
              ;;
          esac

      # the windows-11-arm image ships without WiX (windows-latest
      # preinstalls it), and jpackage needs candle/light for --type msi;
      # the x86 WiX binaries run fine under Windows-on-ARM emulation.
      # choco's PATH edit does not reach later steps, hence GITHUB_PATH.
      - name: Install WiX Toolset (Windows on ARM)
        if: matrix.os == 'windows-11-arm'
        shell: pwsh
        run: |
          choco install wixtoolset -y --no-progress
          $wix = (Resolve-Path 'C:\Program Files (x86)\WiX Toolset*\bin')[0].Path
          Add-Content $env:GITHUB_PATH $wix

      # The full test suite already ran under `mvn verify` in the release
      # job; this leg only needs the jar.  Three tests fail on the Windows
      # runner for environmental reasons (CRLF-sensitive round-trip
      # comparison, @TempDir cleanup vs. an open-file handle, font-metric
      # drift in the geometry baseline) — packaging must not depend on them.
      - name: Build jar (tests ran in the release job)
        shell: bash
        run: mvn -B -q package -DskipTests

      # jar -> jdeps -> jlink -> jpackage; produces target/installer/dist/
      # (deb and, where rpmbuild exists, rpm on Linux; msi on Windows --
      # WiX is preinstalled on windows-latest; dmg on macOS)
      - name: Build installer
        shell: bash
        env:
          JLS_SKIP_BUILD: "1"
        run: bash scripts/build-installer.sh

      # Same provenance statement as the jar, one per installer (#44).
      # Runs before the checksum step so the glob only matches installers.
      - name: Attest build provenance
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: target/installer/dist/*

      # Extends the release's SHA256SUMS with a per-OS-and-arch list
      # covering the installers built on this leg (macOS runners lack
      # sha256sum; the arch suffix keeps the two Linux legs and the two
      # Windows legs from overwriting each other's asset).
      - name: Generate sha256 checksums
        shell: bash
        run: |
          cd target/installer/dist
          # RUNNER_ARCH first: git-bash's uname reports x86_64 under
          # Windows-on-ARM emulation
          ARCH="${RUNNER_ARCH:-$(uname -m)}"
          case "$ARCH" in ARM64|arm64) ARCH=aarch64 ;; X64|amd64) ARCH=x86_64 ;; esac
          SUMS="SHA256SUMS-installers-$(echo "$RUNNER_OS" | tr '[:upper:]' '[:lower:]')-${ARCH}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum * > "$SUMS"
          else
            shasum -a 256 * > "$SUMS"
          fi
          cat "$SUMS"

      # Appends assets to the release the `release` job created (dry runs
      # stop here: the installers were built and checksummed, nothing ships)
      - name: Upload installers to the GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: target/installer/dist/*
          fail_on_unmatched_files: true
