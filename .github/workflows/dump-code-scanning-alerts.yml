# TEMPORARY — will be removed before this branch is merged.
# Dismisses the CodeQL alerts that cannot be resolved in code because the
# flagged parameters are part of a template-method contract (the base
# declaration does not read them, but subclass overrides do, so removing
# them from the base would break the overrides). Then dumps whatever open
# alerts remain on this branch so the result can be verified.
name: Dump code scanning alerts

on:
  push:
    branches: ["claude/jls-security-findings-0293fs"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dismiss:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Dismiss template-method false positives
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # java/unused-parameter on template-method roots: the parameter is
          # used by subclass overrides, so it must stay in the base signature.
          declare -A reason=(
            [1199]="Element.change(): editWindow is used by the 8 subclass overrides (Register, StateMachine, Memory, SigGen, Clock, Text, Constant, TruthTable); the base is the no-op default."
            [1200]="Element.change(): x is used by the 8 subclass overrides; the base is the no-op default."
            [1201]="Element.change(): y is used by the 8 subclass overrides; the base is the no-op default."
            [1071]="Element.showCurrentValue(): where is used by the InputPin/OutputPin/Register/Memory overrides; the base is the no-op default."
            [1258]="StringAttribute.omitted(): el is used by overrides (Display and the anonymous attribute subclasses in Element); the base is the default hook."
          )
          for n in "${!reason[@]}"; do
            echo "Dismissing alert #$n"
            gh api -X PATCH "repos/${{ github.repository }}/code-scanning/alerts/$n" \
              -f state=dismissed \
              -f dismissed_reason="won't fix" \
              -f dismissed_comment="${reason[$n]}" \
              --jq '{number, state, dismissed_reason}'
          done

  dump:
    needs: dismiss
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: read
    steps:
      - name: List remaining open alerts for this branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for page in $(seq 1 40); do
            out=$(gh api "repos/${{ github.repository }}/code-scanning/alerts?state=open&ref=${{ github.ref }}&per_page=100&page=$page" \
              --jq '.[] | {number, rule: .rule.id, path: .most_recent_instance.location.path, start_line: .most_recent_instance.location.start_line, message: .most_recent_instance.message.text}')
            if [ -z "$out" ]; then break; fi
            echo "$out"
          done
          echo "---done---"
