name: CI

# push is limited to master so a branch with an open PR builds once,
# not twice (issue #47)
on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  build:
    name: Build (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [17, 21]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      # Compiles with -Xlint:deprecation,removal,unchecked -Werror, runs
      # the headless test suite, and runs the SpotBugs check goal
      # (threshold High, baseline in config/spotbugs-exclude.xml).
      - name: Build, lint, and analyze
        run: mvn -B verify

      - name: Upload jar
        if: matrix.java == 21
        uses: actions/upload-artifact@v4
        with:
          name: jls-jar
          path: target/jls-*.jar
