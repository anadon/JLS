name: CodeQL

# Static analysis for security issues on every push/PR and weekly
# (issue #67). Alerts appear under the repository's Security tab.
# Actions are SHA-pinned (#44/#68); Dependabot refreshes the pins.
on:
  push:
    branches: ["master"]
  pull_request:
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # the Java analysis needs a real build; the Actions analysis
          # scans the workflow files themselves (issue #67)
          - language: java
            build-mode: manual
          - language: actions
            build-mode: none
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up JDK 25
        if: matrix.language == 'java'
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality

      - name: Build
        if: matrix.language == 'java'
        run: mvn -B -DskipTests package

      - name: Analyze
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
