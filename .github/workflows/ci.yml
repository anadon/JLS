name: CI

# push is limited to master so a branch with an open PR builds once,
# not twice (issue #47)
on:
  push:
    branches: ["master"]
  pull_request:

# least-privilege token: the build only reads the repo (issue #68)
permissions:
  contents: read

# a new push to the same branch/PR cancels the still-running build of the
# old head; release.yml deliberately has no concurrency group (issue #47)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 25 (current LTS) is the required baseline (#92); the newest GA
        # feature release runs as an advisory forward-compatibility leg —
        # it may fail without blocking the build, and becomes the required
        # leg when it becomes the next LTS
        java: [25, 26]
    # only the LTS leg is required; the feature-release leg is advisory
    continue-on-error: ${{ matrix.java != 25 }}
    steps:
      # actions are pinned to full commit SHAs (supply-chain posture,
      # #44/#68); Dependabot keeps the pins fresh via the version comments
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      # External HDL simulators activate the otherwise-skipped
      # Verilog/VHDL validation tests (issue #60); best-effort so a
      # transient apt failure doesn't block the build
      - name: Install HDL simulators
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends iverilog ghdl || echo "HDL simulators unavailable; validation tests will skip"

      # Compiles with -Xlint:deprecation,removal,unchecked -Werror, runs
      # the headless test suite, and runs the SpotBugs check goal
      # (threshold High, baseline in config/spotbugs-exclude.xml).
      - name: Build, lint, and analyze
        run: mvn -B verify

      - name: Upload jar
        if: matrix.java == 25
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jls-jar
          path: target/jls-*.jar

      - name: Upload coverage report
        if: matrix.java == 25
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jacoco-report
          path: target/site/jacoco/

      # per-PR coverage visibility with no external service: the summary
      # table comes straight from the JaCoCo XML report (issue #66)
      - name: Coverage summary
        if: matrix.java == 25
        run: |
          python3 - << 'EOF' >> "$GITHUB_STEP_SUMMARY"
          import xml.etree.ElementTree as ET
          r = ET.parse('target/site/jacoco/jacoco.xml').getroot()
          print('## Coverage (JaCoCo, JDK 25)\n')
          print('| Counter | Covered | Missed | % |')
          print('|---|---|---|---|')
          for c in r.findall('counter'):
              cov, mis = int(c.get('covered')), int(c.get('missed'))
              pct = 100.0 * cov / (cov + mis) if cov + mis else 0.0
              print(f"| {c.get('type')} | {cov} | {mis} | {pct:.1f}% |")
          EOF

  # feed GitHub's dependency graph the resolved transitive tree so
  # Dependabot alerts cover what the build actually uses (issue #65)
  dependency-submission:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 25
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Submit dependency graph
        uses: advanced-security/maven-dependency-submission-action@b275d12641ac2d2108b2cbb7598b154ad2f2cee8 # v5.0.0

  # reproducible-builds check (#44): the pom pins
  # project.build.outputTimestamp, so building the same commit twice must
  # produce byte-identical jars — compare SHA256 of two clean builds
  reproducibility:
    name: Reproducible build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 25
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Build twice and compare jar checksums
        run: |
          mvn -B -DskipTests package
          sha256sum target/jls-*.jar | sed 's|target/||' > first.sha256
          rm -rf target
          mvn -B -DskipTests package
          ( cd target && sha256sum jls-*.jar ) > second.sha256
          echo "first build:";  cat first.sha256
          echo "second build:"; cat second.sha256
          diff first.sha256 second.sha256 \
            || { echo "::error::build is not reproducible: jar checksums differ between two builds of the same commit"; exit 1; }
